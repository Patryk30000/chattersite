<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Render Chat</title>
  <style>
    :root {
      --paper: #efe8d9;
      --paper-deep: #e2dac7;
      --card: #f8f5ee;
      --ink: #1f241d;
      --line: #2e3328;
      --muted: #61695c;
      --accent: #c5532f;
      --accent-dark: #9e3f21;
      --self-bubble: #f8d9bf;
      --peer-bubble: #f2ecdf;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 20px;
      display: grid;
      place-items: center;
      color: var(--ink);
      font-family: "Franklin Gothic Medium", "Arial Narrow", "Segoe UI", sans-serif;
      background:
        radial-gradient(900px 450px at 0% 0%, #f7b76f44, transparent 65%),
        radial-gradient(700px 350px at 100% 100%, #e26d5c33, transparent 65%),
        repeating-linear-gradient(0deg, transparent 0 26px, #00000009 26px 27px),
        linear-gradient(160deg, var(--paper), var(--paper-deep));
    }

    .chat-shell {
      width: min(100%, 900px);
      height: min(90vh, 760px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      border: 2px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: var(--card);
      box-shadow: 7px 7px 0 #00000027;
      animation: slide-in 240ms ease-out;
    }

    header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 2px solid var(--line);
      background: linear-gradient(180deg, #f2ecde, #ece4d4);
    }

    h1 {
      margin: 0;
      font-size: 1.2rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      font-family: "Lucida Console", "Courier New", monospace;
      font-weight: 700;
    }

    .subtitle {
      margin: 5px 0 0;
      font-size: 0.83rem;
      color: var(--muted);
    }

    .status {
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.78rem;
      font-weight: 700;
      background: #ebe4d5;
      color: #7a4c00;
      white-space: nowrap;
      transition: color 100ms ease;
    }

    .status.online {
      color: #275143;
    }

    #messages {
      margin: 0;
      padding: 14px 16px;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      background:
        repeating-linear-gradient(0deg, transparent 0 29px, #00000008 29px 30px),
        linear-gradient(180deg, #f8f4ec, #f3ede0);
      scrollbar-gutter: stable;
    }

    .message {
      max-width: min(82%, 640px);
      display: grid;
      gap: 4px;
      align-self: flex-start;
      animation: fade-up 120ms ease-out;
    }

    .message.self {
      align-self: flex-end;
    }

    .meta {
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      gap: 8px;
      align-items: center;
      font-family: "Lucida Console", "Courier New", monospace;
    }

    .bubble {
      padding: 9px 11px;
      border-radius: 7px 10px 10px 2px;
      border: 1px solid #221f194d;
      background: var(--peer-bubble);
      line-height: 1.38;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      box-shadow: 1px 1px 0 #00000021;
    }

    .message.self .bubble {
      background: var(--self-bubble);
      border-radius: 10px 7px 2px 10px;
    }

    #chat-form {
      display: grid;
      grid-template-columns: 160px 1fr auto;
      gap: 10px;
      padding: 12px 16px 14px;
      border-top: 2px solid var(--line);
      background: #f1eadb;
    }

    input,
    button {
      border-radius: 8px;
      border: 2px solid #2e332840;
      padding: 10px 11px;
      font: inherit;
    }

    input {
      color: var(--ink);
      background: #fffdf8;
      outline: none;
      transition: border-color 100ms ease, box-shadow 100ms ease;
    }

    input:focus {
      border-color: #3e372f;
      box-shadow: 0 0 0 3px #e2cab4;
    }

    button {
      background: linear-gradient(180deg, var(--accent), var(--accent-dark));
      border-color: #4a190b77;
      color: #fff8f0;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      transition: transform 100ms ease, filter 100ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.07);
    }

    @media (max-width: 720px) {
      body {
        padding: 10px;
      }

      .chat-shell {
        height: 92vh;
        border-radius: 10px;
      }

      #chat-form {
        grid-template-columns: 1fr;
      }

      .message {
        max-width: 92%;
      }
    }

    @keyframes slide-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(5px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="chat-shell">
    <header>
      <div>
        <h1>Render Chat</h1>
        <p class="subtitle">Realtime chat powered by Socket.IO and deployable on Render.</p>
      </div>
      <div class="status" id="status">Connecting...</div>
    </header>

    <ul id="messages" aria-live="polite"></ul>

    <form id="chat-form" autocomplete="off">
      <input id="name" name="name" maxlength="24" placeholder="Your name" value="Guest">
      <input id="message" name="message" maxlength="500" placeholder="Write a message..." required>
      <button type="submit">Send</button>
    </form>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    (() => {
      const socket = io({
        transports: ["websocket"],
        reconnection: true,
        reconnectionAttempts: Infinity,
        reconnectionDelay: 800,
        reconnectionDelayMax: 5000,
        timeout: 20000
      });
      const form = document.getElementById("chat-form");
      const messagesEl = document.getElementById("messages");
      const messageInput = document.getElementById("message");
      const nameInput = document.getElementById("name");
      const statusEl = document.getElementById("status");
      let socketId = "";

      function setStatus(text, online) {
        statusEl.textContent = text;
        statusEl.classList.toggle("online", Boolean(online));
      }

      function formatTime(isoTime) {
        return new Date(isoTime).toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      function addMessage({ name, text, at, senderId }) {
        const item = document.createElement("li");
        item.className = "message";
        const mine = senderId && senderId === socketId;
        if (mine) {
          item.classList.add("self");
        }

        const meta = document.createElement("div");
        meta.className = "meta";

        const author = document.createElement("span");
        author.textContent = mine ? "You" : name || "Guest";

        const time = document.createElement("span");
        time.textContent = at ? formatTime(at) : "";

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = text;

        meta.append(author, time);
        item.append(meta, bubble);
        messagesEl.appendChild(item);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      socket.on("connect", () => {
        socketId = socket.id;
        setStatus("Connected", true);
      });

      socket.on("disconnect", (reason) => {
        setStatus(`Disconnected (${reason})`, false);
      });

      socket.io.on("reconnect_attempt", () => {
        setStatus("Reconnecting...", false);
      });

      socket.on("connect_error", (error) => {
        const detail = error && error.message ? error.message : "unknown";
        setStatus(`Connection error: ${detail}`, false);
      });

      socket.on("chat message", addMessage);

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const text = messageInput.value.trim();
        if (!text) {
          return;
        }

        socket.emit("chat message", {
          name: nameInput.value.trim() || "Guest",
          text
        });

        messageInput.value = "";
        messageInput.focus();
      });

      addMessage({
        name: "System",
        text: "Welcome. Open this chat from another browser tab or device to test realtime messaging.",
        at: new Date().toISOString()
      });
    })();
  </script>
</body>
</html>
